<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0c40bb; --n-col: #ffffff; --out: #54301d; --btm: #0b08d4; --c-let: #e32b2b; --c-num: #1e40af; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }
        * { font-weight: 950 !important; }
        
        #loginOverlay { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 30px; border: 8px solid #000; width: 90%; max-width: 400px; box-shadow: 0 20px 0 #000; }

        .main-app-box { border: 10px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; overflow-x: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .premium-header { background-color: var(--p-bg); padding: 25px; border-bottom: 10px solid var(--btm); position: relative; }
        
        .cat-card { background: #fff; border: 4px solid var(--out); border-radius: 20px; text-align: center; padding: 15px 10px; box-shadow: 8px 8px 0px var(--out); transition: 0.2s; cursor: pointer; }
        .cat-card:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--out); }

        .btn-style { border-bottom: 6px solid rgba(0,0,0,0.4); color: #fff !important; cursor: pointer; transition: 0.1s; text-transform: uppercase; }
        .btn-style:active { transform: translateY(3px); border-bottom-width: 3px; }
        
        .action-bar { display: flex; width: 100%; background: #000; padding: 8px; gap: 8px; }
        .action-btn { flex: 1; padding: 12px 0; border: 3px solid #fff; color: #fff; font-size: 14px; text-align: center; cursor: pointer; border-radius: 12px; box-shadow: 0 4px 0 #444; }
        .action-btn.active { background: #ffeb3b; color: #000; box-shadow: none; transform: translateY(4px); }
        .hidden { display: none !important; }
        .cp-card { background: #fff; width: 98%; max-width: 1300px; border-radius: 40px; padding: 20px; border: 10px solid #000; max-height: 95vh; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 10px; border: 2px solid #000; border-radius: 10px; margin-bottom: 2px; font-size: 11px; }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box text-center">
        <h2 class="text-3xl mb-6 italic uppercase">SAHA LOGIN</h2>
        <input type="text" id="logUser" placeholder="USER ID" class="w-full p-4 mb-4 border-4 border-black rounded-xl text-center uppercase">
        <input type="password" id="logPin" placeholder="PASSWORD" class="w-full p-4 mb-6 border-4 border-black rounded-xl text-center">
        <button onclick="handleLogin()" id="loginSubmitBtn" class="w-full bg-blue-600 py-4 rounded-xl text-white text-xl btn-style">LOG IN ✅</button>
    </div>
</div>

<div id="appPage" class="hidden">
    <div id="mainContainer" class="main-app-box mx-auto">
        <div class="premium-header">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="location.reload()" class="bg-red-600 w-12 h-12 rounded-full border-4 border-black text-white text-2xl">⬅</button>
                    <div>
                        <h1 id="dispTitle" class="text-3xl italic uppercase" style="color: var(--n-col);">SAHAYARAJ-2026</h1>
                        <div id="liveDateTime" class="text-yellow-300 font-bold" style="font-size: 14px;"></div>
                        <p id="expiryDisplay" class="text-yellow-200 font-bold mt-1" style="font-size: 12px;"></p>
                    </div>
                </div>
                <div class="text-right text-white">
                    <p class="text-[10px]">ID: <span id="currentUser" class="text-yellow-400"></span></p>
                    <h2 id="mainTotal" class="text-3xl">₹0</h2>
                    <button onclick="openSettings()" class="text-3xl">⚙️</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-btn bg-yellow-500" onclick="document.getElementById('bellStartDate').showPicker()">🔔 BELL <input type="date" id="bellStartDate" onchange="setStartingDate()" class="absolute opacity-0 w-0"></div>
            <div id="viewCR" onclick="setViewMode('CR')" class="action-btn active">CREDIT (+)</div>
            <div id="viewDR" onclick="setViewMode('DR')" class="action-btn">DEBIT (-)</div>
            <div id="viewBOTH" onclick="setViewMode('BOTH')" class="action-btn">BOTH</div>
        </div>

        <div class="p-4">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-5 mb-4"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[10px_10px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 uppercase">New Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="eDate" class="border-2 border-black p-3 rounded-xl">
                        <input type="tel" id="eMob" placeholder="Mobile" class="border-2 border-black p-3 rounded-xl">
                        <select id="eCat" class="border-2 border-black p-3 rounded-xl"></select>
                        <input type="text" id="eDesc" placeholder="Remark" class="border-2 border-black p-3 rounded-xl">
                        <input type="number" id="eAmt" placeholder="Amount" class="border-2 border-black p-3 rounded-xl">
                        <select id="eType" class="border-2 border-black p-3 rounded-xl"><option value="CR">IN (+)</option><option value="DR">OUT (-)</option></select>
                    </div>
                    <button onclick="saveData()" class="w-full py-4 mt-6 rounded-xl text-xl btn-style bg-green-600">SAVE ✅</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[10px_10px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 uppercase">Tools</h3>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="downloadPDF()" class="bg-orange-600 py-3 rounded-lg btn-style text-[10px]">PDF</button>
                        <button onclick="sendWhatsApp()" class="bg-green-600 py-3 rounded-lg btn-style text-[10px]">W/APP</button>
                        <button onclick="exportData()" class="bg-purple-600 py-3 rounded-lg btn-style text-[10px]">EXPORT</button>
                        <button onclick="refresh()" class="bg-slate-800 py-3 rounded-lg btn-style text-[10px]">SEARCH</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 bg-white border-4 border-black rounded-3xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-black text-white">
                        <tr><th class="p-3">DATE</th><th class="p-3">CAT</th><th class="p-3">REMARK</th><th class="p-3 text-right">AMOUNT</th><th class="p-3">ACTION</th></tr>
                    </thead>
                    <tbody id="resTable" class="text-center"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// --- CONFIG & CLOUD ---
let cfg = JSON.parse(localStorage.getItem('saha_v66_cfg')) || {
    "title":"SAHAYARAJ-2026", "headCol":"#0c40bb", "nameCol":"#ffffff", "outCol":"#54301d", "btmCol":"#0b08d4",
    "cats":["CASH", "BANK"], "expiryDate":"", "currentUser":""
};
let db = JSON.parse(localStorage.getItem('saha_v66_db')) || [];
let currentViewMode = "CR"; 
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygZcLr-Pd06FWPNIC4g3x-IIENxKzfoNa-0k3rYNFCc29aolA9Y1inH8st6v1QWOk9Hg/exec";

// --- STARTUP ---
function init() {
    if(cfg.currentUser) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('appPage').classList.remove('hidden');
        document.getElementById('currentUser').innerText = cfg.currentUser;
        updateExpiryText();
    }
    
    document.documentElement.style.setProperty('--p-bg', cfg.headCol);
    document.documentElement.style.setProperty('--n-col', cfg.nameCol);
    document.getElementById('dispTitle').innerText = cfg.title;
    
    startClock(); renderUI(); refresh();
}

// --- CLOUD LOGIN (Fixes Reload Issue) ---
async function handleLogin() {
    const u = document.getElementById('logUser').value.trim().toUpperCase();
    const p = document.getElementById('logPin').value.trim();
    const btn = document.getElementById('loginSubmitBtn');

    // இன்றைய தேதியை எடுக்கும் முறை
    const now = new Date();
    const today = now.toISOString().split('T')[0];

    if(!u || !p) return alert("ID & PIN REQUIRED!");
    btn.innerText = "CHECKING... ⏳"; btn.disabled = true;

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL);
        const users = await response.json();
        const found = users.find(x => x.id === u && x.pin === p);
        
        if (found) {
            if (today <= found.exp) {
                // இதுதான் தேதியை உங்கள் மொபைலில் நிரந்தரமாகப் பதிவு செய்யும்
                cfg.expiryDate = found.exp; 
                cfg.currentUser = found.id;
                localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg));

                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('appPage').classList.remove('hidden');
                document.getElementById('currentUser').innerText = found.id;
                
                // தேதியைக் காட்டும் வேலையைச் செய்கிறது
                updateExpiryText();
            } else { 
                alert("காலாவதியாகிவிட்டது! Exp: " + found.exp); 
            }
        } else { alert("தவறான ஐடி/பாஸ்வேர்ட்!"); }
    } catch (e) { alert("இன்டர்நெட் எர்ரர்!"); }
    finally { btn.innerText = "LOG IN ✅"; btn.disabled = false; }
}

// இந்த சின்ன பங்க்ஷனையும் அதன் கீழே சேர்த்துவிடுங்கள்
function updateExpiryText() {
    if(cfg.expiryDate) {
        const d = cfg.expiryDate.split('-').reverse().join('/');
        document.getElementById('expiryDisplay').innerText = "RENEWAL: " + d;
    }
}

    if(!u || !p) return alert("ID & PIN REQUIRED!");
    btn.innerText = "WAIT... ⏳"; btn.disabled = true;

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL);
        const users = await response.json();
        const found = users.find(x => x.id === u && x.pin === p);
        
        if (found) {
            if (today <= found.exp) {
                cfg.expiryDate = found.exp; 
                cfg.currentUser = found.id;
                localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg));
                location.reload(); 
            } else { alert("EXPIRED ON: " + found.exp); }
        } else { alert("WRONG ID/PIN!"); }
    } catch (e) { alert("CHECK INTERNET!"); }
    finally { btn.innerText = "LOG IN ✅"; btn.disabled = false; }
}

function updateExpiryText() {
    if(cfg.expiryDate) {
        let exp = new Date(cfg.expiryDate);
        exp.setDate(exp.getDate() - 1); 
        document.getElementById('expiryDisplay').innerText = "RENEWAL: " + exp.toLocaleDateString('en-GB');
    }
}

// --- CORE APP ---
function startClock() { setInterval(() => { const now = new Date(); document.getElementById('liveDateTime').innerHTML = `${now.toLocaleDateString('en-GB')} | ${now.toLocaleTimeString('en-GB')}`; }, 1000); }

function renderUI() {
    const grid = document.getElementById('catGrid'), eSel = document.getElementById('eCat');
    grid.innerHTML = ""; eSel.innerHTML = ""; 
    cfg.cats.forEach(c => {
        grid.innerHTML += `<div class="cat-card"><p>${c}</p><h3>₹<span id="sum_${c}">0</span></h3></div>`;
        eSel.innerHTML += `<option value="${c}">${c}</option>`;
    });
}

function saveData() {
    const d = document.getElementById('eDate').value, a = document.getElementById('eAmt').value;
    if(!d || !a) return alert("DATE & AMOUNT!");
    db.push({ id: Date.now(), date: d, mob: document.getElementById('eMob').value || "-", cat: document.getElementById('eCat').value, desc: document.getElementById('eDesc').value || "-", amt: a, type: document.getElementById('eType').value });
    localStorage.setItem('saha_v66_db', JSON.stringify(db));
    refresh();
}

function refresh() {
    db.sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = "", grand = 0, tempSums = {}; cfg.cats.forEach(c => tempSums[c] = 0);
    db.filter(t => currentViewMode === "BOTH" || t.type === currentViewMode).forEach(t => {
        let amt = parseFloat(t.amt) || 0; let v = (t.type === "CR") ? amt : -amt;
        tempSums[t.cat] += v; grand += v;
        html += `<tr class="border-b"><td class="p-3">${t.date.split('-').reverse().join('/')}</td><td>${t.cat}</td><td>${t.desc}</td><td class="text-right ${t.type==='CR'?'text-green-600':'text-red-600'}">₹${amt}</td><td><button onclick="del(${t.id})">✖</button></td></tr>`;
    });
    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    cfg.cats.forEach(c => { if(document.getElementById('sum_'+c)) document.getElementById('sum_'+c).innerText = (tempSums[c] || 0).toLocaleString(); });
}

function setViewMode(m) { currentViewMode = m; document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active')); document.getElementById('view'+m).classList.add('active'); refresh(); }
function del(id) { if(confirm("DELETE?")) { db = db.filter(x => x.id !== id); localStorage.setItem('saha_v66_db', JSON.stringify(db)); refresh(); } }
function exportData() { const blob = new Blob([JSON.stringify(db)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Saha_Backup.json`; a.click(); }
function downloadPDF() { alert("PDF Processing..."); }
function sendWhatsApp() { alert("WhatsApp Sending..."); }
function openSettings() { if(prompt("ADMIN PIN:") === cfg.adminPin) { alert("Settings Panel Active"); } }
</script>
</body>
</html>
