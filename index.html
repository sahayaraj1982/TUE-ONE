<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0c40bb; --n-col: #ffffff; --out: #54301d; --btm: #0b08d4; --c-let: #e32b2b; --c-num: #1e40af; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }
        * { font-weight: 950 !important; }
        
        #loginOverlay { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 2000; }
        .login-box { background: white; padding: 30px; border-radius: 30px; border: 8px solid #000; width: 95%; max-width: 400px; box-shadow: 0 20px 0 #000; }

        .main-app-box { border: 10px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; overflow-x: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .premium-header { background-color: var(--p-bg); padding: 25px; border-bottom: 10px solid var(--btm); position: relative; }
        
        .cat-card { background: #fff; border: 4px solid var(--out); border-radius: 20px; text-align: center; padding: 15px 10px; position: relative; box-shadow: 8px 8px 0px var(--out); transition: 0.2s; cursor: pointer; }
        .cat-card:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--out); }

        .btn-style { border-bottom: 6px solid rgba(0,0,0,0.4); color: #fff !important; cursor: pointer; transition: 0.1s; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-style:active { transform: translateY(3px); border-bottom-width: 3px; }
        
        .cp-card { background: #fff; width: 98%; max-width: 1300px; border-radius: 40px; padding: 20px; border: 10px solid #000; max-height: 95vh; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 10px; border: 2px solid #000; border-radius: 10px; margin-bottom: 2px; font-size: 11px; }
        .setting-row input { border: 1px solid #ccc; text-align: center; border-radius: 5px; }
        .filter-btn-active { background-color: #ef4444 !important; border: 3px solid #000 !important; box-shadow: none !important; transform: translateY(2px); }
        .section-title { background: #1e3a8a; color: white; padding: 2px 10px; font-size: 10px; text-transform: uppercase; margin-top: 10px; }
        
        .action-bar { display: flex; width: 100%; background: #000; padding: 8px; gap: 8px; }
        .action-btn { flex: 1; padding: 12px 0; border: 3px solid #fff; color: #fff; font-size: 14px; text-align: center; cursor: pointer; border-radius: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #444; }
        .action-btn.active { background: #ffeb3b; color: #000; border-color: #000; box-shadow: none; transform: translateY(4px); }
        .bell-btn { background: #facc15; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box text-center">
        <h2 class="text-3xl mb-6 italic uppercase">SAHA LOGIN</h2>
        <input type="text" id="logUser" placeholder="USER ID" class="w-full p-4 mb-4 border-4 border-black rounded-xl text-center uppercase">
        <input type="password" id="logPin" placeholder="PASSWORD" class="w-full p-4 mb-6 border-4 border-black rounded-xl text-center">
        <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl text-white text-xl btn-style">LOG IN ✅</button>
        <p class="text-[10px] mt-4 opacity-50">V6.6 SECURE ACCESS</p>
    </div>
</div>

<div id="appPage" class="hidden">
    <div id="mainContainer" class="main-app-box mx-auto">
        <div class="premium-header">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="backBtn" onclick="logout()" class="bg-red-600 w-12 h-12 rounded-full border-4 border-black text-white text-2xl shadow-lg">⬅</button>
                    <div>
                        <h1 id="dispTitle" class="text-4xl italic uppercase" style="color: var(--n-col); text-shadow: 3px 3px 0 #000;">SAHAYARAJ-2026</h1>
                        <div id="liveDateTime" class="text-yellow-300 font-bold" style="font-size: 14px;"></div>
                        <p id="startDateDisplay" class="text-xs text-white opacity-80"></p>
                        <p id="expiryDisplay" class="text-yellow-200 font-bold text-xs mt-1"></p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right text-white">
                        <p class="text-[10px] opacity-70">ID: <span id="currentUserDisplay" class="text-yellow-400"></span></p>
                        <h2 id="mainTotal" class="text-4xl" style="text-shadow: 2px 2px 0 #000;">₹0</h2>
                    </div>
                    <button onclick="openSettings()" class="text-5xl text-white hover:rotate-90 transition-transform">⚙️</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-btn bell-btn" onclick="document.getElementById('bellStartDate').showPicker()">🔔 BELL<input type="date" id="bellStartDate" onchange="setStartingDate()" class="absolute opacity-0 pointer-events-none w-0"></div>
            <div id="viewCR" onclick="setViewMode('CR')" class="action-btn active">CREDIT (+)</div>
            <div id="viewDR" onclick="setViewMode('DR')" class="action-btn">DEBIT (-)</div>
            <div id="viewBOTH" onclick="setViewMode('BOTH')" class="action-btn">BOTH</div>
        </div>

        <div class="p-4">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-5 mb-4"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[10px_10px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 italic uppercase">New Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="hidden" id="editId"><input type="date" id="eDate" class="border-2 border-black p-3 rounded-xl">
                        <input type="tel" id="eMob" placeholder="Mobile" class="border-2 border-black p-3 rounded-xl">
                        <select id="eCat" class="border-2 border-black p-3 rounded-xl"></select>
                        <input type="text" id="eDesc" placeholder="Remark" class="border-2 border-black p-3 rounded-xl">
                        <input type="number" id="eAmt" placeholder="Amount" class="border-2 border-black p-3 rounded-xl">
                        <select id="eType" class="border-2 border-black p-3 rounded-xl"><option value="CR">IN (+)</option><option value="DR">OUT (-)</option></select>
                    </div>
                    <button onclick="saveData()" id="saveBtn" class="w-full py-4 mt-6 rounded-xl text-xl btn-style bg-green-600">SAVE ✅</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[10px_10px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 italic uppercase">Search & Tools</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                        <input type="date" id="fDate" class="text-xs border-2 border-black p-2"><input type="date" id="tDate" class="text-xs border-2 border-black p-2">
                        <input type="tel" id="sMob" placeholder="Mobile" class="text-xs border-2 border-black p-2"><input type="text" id="sDesc" placeholder="Remark Search" class="text-xs border-2 border-black p-2">
                    </div>
                    <div id="filterCatList" class="flex flex-wrap gap-2 mb-4"></div>
                    <div class="grid grid-cols-4 gap-3">
                        <button id="pdfBtn" onclick="downloadPDF()" class="bg-orange-600 py-3 rounded-lg btn-style text-[10px]">PDF</button>
                        <button id="waBtn" onclick="sendWhatsApp()" class="bg-green-600 py-3 rounded-lg btn-style text-[10px]">W/APP</button>
                        <button id="impBtn" onclick="document.getElementById('impFile').click()" class="bg-blue-600 py-3 rounded-lg btn-style text-[10px]">IMPORT</button>
                        <button id="expBtn" onclick="exportData()" class="bg-purple-600 py-3 rounded-lg btn-style text-[10px]">EXPORT</button>
                        <button onclick="promptAddCat()" class="bg-cyan-600 py-3 rounded-lg btn-style text-[10px]">ADD CAT</button>
                        <button onclick="promptDelCat()" class="bg-pink-600 py-3 rounded-lg btn-style text-[10px]">DEL CAT</button>
                        <button onclick="promptDriveUrl()" class="bg-yellow-600 py-3 rounded-lg btn-style text-[10px]">DRIVE URL</button>
                        <button id="delAllBtn" onclick="deleteAll()" class="bg-red-600 py-3 rounded-lg btn-style text-[10px]">DEL ALL</button>
                    </div>
                    <input type="file" id="impFile" class="hidden" onchange="importData(event)">
                    <button onclick="refresh()" class="w-full bg-slate-800 text-white py-4 mt-4 rounded-xl btn-style">SEARCH DATA 🔎</button>
                </div>
            </div>

            <div class="mt-8 bg-white border-4 border-black rounded-3xl overflow-hidden shadow-2xl">
                <table class="w-full text-sm">
                    <thead class="bg-black text-white"><tr><th class="p-3">DATE</th><th class="p-3">MOBILE</th><th class="p-3">CAT</th><th class="p-3">REMARK</th><th class="p-3 text-right">AMOUNT</th><th class="p-3 text-center">ACTION</th></tr></thead>
                    <tbody id="resTable" class="text-center"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="setModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-2">
    <div class="cp-card">
        <div class="flex justify-between items-center mb-4"><h2 class="text-2xl uppercase">Control Panel</h2><button onclick="closeSettings()" class="bg-red-600 text-white px-6 py-2 rounded-xl btn-style">CLOSE</button></div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div><p class="section-title">Colors</p><div class="setting-row"><span>Banner</span><input type="color" id="setHeadCol"></div><div class="setting-row"><span>Name</span><input type="color" id="setNameCol"></div><div class="setting-row"><span>Out</span><input type="color" id="setOutCol"></div></div>
            <div><p class="section-title">Text</p><div class="setting-row"><span>Title</span><input type="text" id="setTitle" class="w-24 text-[10px]"></div><div class="setting-row"><span>Entry Size</span><input type="number" id="setFsEnt" class="w-12"></div></div>
            <div><p class="section-title">Security</p><div class="setting-row"><span>Admin PIN</span><input type="password" id="setAdminPin" class="w-16"></div></div>
        </div>
        <button onclick="saveSettings()" class="w-full bg-blue-700 text-white py-4 mt-6 rounded-xl text-2xl btn-style">SAVE ✅</button>
    </div>
</div>

<script>
const USERS_DB = [
    { id: "FLOR", pin: "1234", exp: "2026-12-30" },
    { id: "SAHA", pin: "2233", exp: "2026-06-15" },
    { id: "PANEER", pin: "4455", exp: "2026-08-20" },
    { id: "ADMIN", pin: "0000", exp: "2027-01-01" }
];

let cfg = JSON.parse(localStorage.getItem('saha_v66_cfg')) || {
    "title":"SAHAYARAJ-2026", "headCol":"#0c40bb", "nameCol":"#ffffff", "outCol":"#54301d", "btmCol":"#0b08d4", "catLetCol":"#e32b2b", "catNumCol":"#1e40af",
    "scrW":95, "fsDT":22, "fsCatL":14, "fsCatN":28, "fsEnt":14,
    "swBack":true, "swDate":true, "swClock":true, "swPen":true, "swTrDel":true, "swAllDel":true, "swPdf":true, "swWa":true, "swImp":true, "swExp":true,
    "adminPin":"1020", "expiryDate":"", "isLogged": false, "currentUser":"", "cats":[]
};
let db = JSON.parse(localStorage.getItem('saha_v66_db')) || [];
let activeFilters = [];
let currentViewMode = "CR"; 

function init() {
    if(cfg.isLogged) checkAndShowApp();
    document.documentElement.style.setProperty('--p-bg', cfg.headCol);
    document.documentElement.style.setProperty('--n-col', cfg.nameCol);
    document.documentElement.style.setProperty('--btm', cfg.btmCol);
    document.documentElement.style.setProperty('--out', cfg.outCol);
    document.getElementById('mainContainer').style.width = cfg.scrW + "%";
    document.getElementById('dispTitle').innerText = cfg.title;
    startClock(); renderUI(); refresh();
}

function handleLogin() {
    const uInput = document.getElementById('logUser').value.trim().toUpperCase();
    const pInput = document.getElementById('logPin').value.trim();
    const todayStr = new Date().toISOString().split('T')[0];
    const found = USERS_DB.find(u => u.id === uInput && u.pin === pInput);

    if (found) {
        if (todayStr <= found.exp) {
            cfg.isLogged = true; cfg.currentUser = found.id; cfg.expiryDate = found.exp;
            localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg));
            checkAndShowApp();
        } else { alert("EXPIRED: " + found.exp); }
    } else { alert("INVALID LOGIN!"); }
}

function checkAndShowApp() {
    const todayStr = new Date().toISOString().split('T')[0];
    if (todayStr > cfg.expiryDate) { logout(); return; }
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('currentUserDisplay').innerText = cfg.currentUser;
    if(cfg.expiryDate) {
        let exp = new Date(cfg.expiryDate); exp.setDate(exp.getDate() - 1);
        document.getElementById('expiryDisplay').innerText = "RENEWAL: " + exp.toLocaleDateString('en-GB');
    }
}

function logout() { cfg.isLogged = false; localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); location.reload(); }
function startClock() { setInterval(() => { const now = new Date(); document.getElementById('liveDateTime').innerHTML = `${now.toLocaleDateString('en-GB')} | ${now.toLocaleTimeString('en-GB')}`; }, 1000); }

function renderUI() {
    const grid = document.getElementById('catGrid'), eSel = document.getElementById('eCat'), fList = document.getElementById('filterCatList');
    grid.innerHTML = ""; eSel.innerHTML = ""; fList.innerHTML = `<button onclick="toggleFilter('ALL')" id="btn_ALL" class="bg-blue-900 text-white px-3 py-1 rounded-lg btn-style text-[10px] filter-btn-active">ALL</button>`;
    cfg.cats.forEach((c) => {
        grid.innerHTML += `<div class="cat-card"><p style="font-size:${cfg.fsCatL}px; color:var(--c-let)">${c}</p><h3 style="font-size:${cfg.fsCatN}px; color:var(--c-num)">₹<span id="sum_${c}">0</span></h3></div>`;
        eSel.innerHTML += `<option value="${c}">${c}</option>`;
        fList.innerHTML += `<button onclick="toggleFilter('${c}')" id="btn_${c}" class="bg-blue-900 text-white px-3 py-1 rounded-lg btn-style text-[10px]">${c}</button>`;
    });
}

function refresh() {
    db.sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = "", grand = 0;
    let tempSums = {}; cfg.cats.forEach(c => tempSums[c] = 0);
    
    // பில்டரைத் தாண்டி பட்டன்களில் தொகை வர கணக்கீடு
    db.forEach(t => {
        let v = (t.type === "CR") ? parseFloat(t.amt) : -parseFloat(t.amt);
        if(tempSums.hasOwnProperty(t.cat)) tempSums[t.cat] += v;
    });

    let filtered = getFilteredData();
    filtered.forEach(t => {
        let amt = parseFloat(t.amt) || 0;
        grand += (t.type === "CR" ? amt : -amt);
        html += `<tr class="border-b" style="font-size:${cfg.fsEnt}px">
            <td class="p-3">${t.date.split('-').reverse().join('/')}</td><td class="p-3">${t.mob}</td><td class="p-3">${t.cat}</td>
            <td class="p-3 text-blue-700">${t.desc}</td><td class="p-3 text-right ${t.type==='CR'?'text-green-600':'text-red-600'}">₹${amt.toLocaleString()}</td>
            <td class="p-3 flex justify-center gap-4"><button onclick="editRow(${t.id})">🖋️</button><button onclick="del(${t.id})" class="text-red-600">✖</button></td></tr>`;
    });
    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    cfg.cats.forEach(c => { if(document.getElementById('sum_'+c)) document.getElementById('sum_'+c).innerText = (tempSums[c] || 0).toLocaleString(); });
}

function getFilteredData() {
    const fD = document.getElementById('fDate').value, tD = document.getElementById('tDate').value, sM = document.getElementById('sMob').value, sDes = document.getElementById('sDesc').value.toLowerCase();
    return db.filter(t => {
        const mBell = (!cfg.startingDate || t.date >= cfg.startingDate), mCat = (activeFilters.length === 0 || activeFilters.includes(t.cat)), mDate = (!fD || t.date >= fD) && (!tD || t.date <= tD), mMob = (!sM || t.mob.includes(sM)), mDesc = (!sDes || t.desc.toLowerCase().includes(sDes)), mView = (currentViewMode === "BOTH" || t.type === currentViewMode);
        return mBell && mCat && mDate && mMob && mDesc && mView;
    });
}

function saveData() {
    const d = document.getElementById('eDate').value, a = document.getElementById('eAmt').value, editId = document.getElementById('editId').value;
    if(!d || !a) return alert("REQUIRED!");
    let entry = { id: editId ? parseInt(editId) : Date.now(), date: d, mob: document.getElementById('eMob').value || "-", cat: document.getElementById('eCat').value, desc: document.getElementById('eDesc').value || "-", amt: a, type: document.getElementById('eType').value };
    if(editId) { db[db.findIndex(x => x.id == editId)] = entry; document.getElementById('editId').value = ""; document.getElementById('saveBtn').innerText = "SAVE ✅"; } else { db.push(entry); }
    localStorage.setItem('saha_v66_db', JSON.stringify(db)); refresh();
}

function setViewMode(mode) { currentViewMode = mode; document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('view' + mode).classList.add('active'); refresh(); }
function toggleFilter(cat) { if(cat === 'ALL') { activeFilters = []; document.querySelectorAll('#filterCatList button').forEach(b => b.classList.remove('filter-btn-active')); document.getElementById('btn_ALL').classList.add('filter-btn-active'); } else { document.getElementById('btn_ALL').classList.remove('filter-btn-active'); const idx = activeFilters.indexOf(cat); if(idx > -1) { activeFilters.splice(idx, 1); document.getElementById('btn_'+cat).classList.remove('filter-btn-active'); } else { activeFilters.push(cat); document.getElementById('btn_'+cat).classList.add('filter-btn-active'); } if(activeFilters.length === 0) document.getElementById('btn_ALL').classList.add('filter-btn-active'); } refresh(); }
function openSettings() { if(prompt("ADMIN PIN:") === cfg.adminPin) document.getElementById('setModal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('setModal').classList.add('hidden'); }
function saveSettings() { cfg.title = document.getElementById('setTitle').value; cfg.adminPin = document.getElementById('setAdminPin').value; localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); location.reload(); }
function del(id) { if(confirm("DEL?")) { db = db.filter(x => x.id !== id); localStorage.setItem('saha_v66_db', JSON.stringify(db)); refresh(); } }
function promptAddCat() { const name = prompt("NAME:").trim().toUpperCase(); if(name && !cfg.cats.includes(name)) { cfg.cats.push(name); localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); init(); } }
function promptDelCat() { const name = prompt("DELETE NAME:").trim().toUpperCase(); if(cfg.cats.includes(name)) { cfg.cats = cfg.cats.filter(c => c !== name); localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); init(); } }
</script>
</body>
</html>
